<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techgadget price matrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Techgadget comparison</h1>

        <div class="grid">  
            <article>
                <h2>standard Model</h2>
                <div>perfect for daily use.</div>
                <div class="price-tag">
                <span>$</span>99
                <div>includes free shipping</div></div>
                <button>Buy now</button>
            </article>

            <article>
                <h2>Pro model</h2>
                <div>For the power users.</div>
                <div class="price-tag">
                    <span>$</span>199
                </div>
                <button>Buy now</button>
            </article>
        </div>
        <ul class="features">
            <li>OLED Display</li>
            <li>12-hour Battery</li>
            <li>Water Resistant</li>
            <li>5G Enabled</li>
        </ul>
        <footer>
            <a href="#">home</a>
            <a href="#">products</a>
            <a href="#">contacts</a>
        </footer>

    </main>
    
</body>
</html>
